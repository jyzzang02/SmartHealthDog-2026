spring:
  application:
    name: backend
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    # 스키마 자동 생성 설정 (개발 환경에서만 사용 권장)
    # generate-ddl: true 

    # 스키마를 SQL 파일로 내보내기 설정 (필요시 사용)
    # properties.javax.persistence.schema-generation.scripts.action: create
    # properties.javax.persistence.schema-generation.scripts.create-target: src/main/resources/schema.sql
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    user: postgres
    password: ${DB_PASSWORD}
    baseline-on-migrate: true
    placeholders:
      ai:
        user:
          email: ${AI_MODEL_SERVICE_EMAIL}
          password-hash: ${AI_MODEL_SERVICE_PASSWORD_HASH}
  mail:
    host: ${SMTP_HOST}
    username: ${SMTP_USER}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          port: 25
          auth: true
          starttls:
            enable: true
            required: true
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD:}        # Redis 비밀번호 (필요시 설정)
    database: 0
    timeout: 5000ms                      # Connection timeout
    lettuce:
      pool:
        max-active: 8                    # Maximum total connections
        max-idle: 8                      # Maximum idle connections
        min-idle: 2                       # Minimum idle connections
  quartz:
    auto-startup: false
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org.quartz.jobStore.class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.jobStore.isClustered: true
      org.quartz.jobStore.clusterCheckinInterval: 10000
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.scheduler.instanceName: ClusteredQuartzScheduler
      org.quartz.threadPool.threadCount: 1
  security:
    oauth2:
      client:
        provider:
          google:
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
          kakao:
            user-info-uri: https://kapi.kakao.com/v2/user/me

logging:
  level:
    org.springframework.security: DEBUG

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration:
      minutes: 1440 # 1 day (실제 서비스에서는 이 값을 15로 설정 권장)
  refresh-token:
    expiration:
      days: 7
    max-count: 10

app:
  mail:
    from: ${SMTP_FROM}
    allowed-emails: ${ALLOWED_EMAILS_COMMA_SEPARATED}
  token:
    email-verification:
      secret: ${EMAIL_VERIFICATION_SECRET}
      # 이메일 인증 시도 최대 횟수
      tries:
        count: 10000 # 최대 10,000회 시도 가능 (실제 서비스에서는 이 값을 5로 설정 권장)
        duration:
          days: 1
      # 이메일 인증 토큰 당 실패 시도 최대 횟수
      failure:
        attempts: 100 # 최대 100회 실패 허용 (실제 서비스에서는 이 값을 5로 설정 권장)
      # 이메일 인증 토큰 당 최대 실패 후 잠금 기간 (분)
      lock:
        duration:
          minutes: 30
      # 이메일 인증 토큰 만료 시간 (분)
      expiration:
        minutes: 15
    password-reset:
      expiration:
        minutes: 15

cloud:
  aws:
    region:
      static: ${AWS_REGION}
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    s3:
      bucket: ${AWS_S3_BUCKET}
    cloudfront:
      domain: ${AWS_CLOUDFRONT_DOMAIN}

local-storage:
  url-prefix: ${LOCAL_STORAGE_URL_PREFIX}
  ai-url-prefix: ${AI_MODEL_SERVICE_URL_PREFIX}
  local-resource-path: ${LOCAL_RESOURCE_PATH}

inference-service:
  retry:
    max-attempts: ${INFERENCE_SERVICE_RETRY_MAX_ATTEMPTS}
  timeout:
    seconds: ${INFERENCE_SERVICE_TIMEOUT_SECONDS}
  batch:
    size: ${INFERENCE_SERVICE_BATCH_SIZE}
  interval:
    seconds: ${INFERENCE_SERVICE_INTERVAL_SECONDS} # 사용자가 무작위로 진단 요청을 보낼 때 AI 모델 서비스에 과부하가 걸리지 않도록 요청 간격을 조절하는 데 사용